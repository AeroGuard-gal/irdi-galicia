<!DOCTYPE html>
<html lang="gl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>IRDI Galicia · VOST Galicia × ALVORA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --fondo:       #080f18;
      --panel:       #0d1520;
      --panel-2:     #14202e;
      --bordo:       #1e2d3d;
      --texto:       #e8eef4;
      --texto-suave: #7a9bb5;
      --laranxa:     #E8590C;
      --fonte: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mono:  'SF Mono', 'Fira Mono', 'Consolas', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; font-family: var(--fonte); background: var(--fondo); color: var(--texto); }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    /* ── CABECEIRA ── */
    header {
      height: 52px;
      background: #080f18;
      border-bottom: 2px solid var(--laranxa);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .cab-marca {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .cab-marca img.logo-vost  { height: 28px; width: auto; }
    .cab-marca img.logo-alvora { height: 17px; width: auto; }
    .cab-divisor {
      width: 1px; height: 22px;
      background: rgba(255,255,255,.15);
      flex-shrink: 0;
    }
    .cab-divisor--leve { background: rgba(255,255,255,.08); }
    .cab-titulo {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      white-space: nowrap;
    }
    .cab-badge {
      background: rgba(232,89,12,.15);
      color: var(--laranxa);
      border: 1px solid rgba(232,89,12,.3);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .cab-dereita {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cab-fonte {
      font-size: 0.7rem;
      color: var(--texto-suave);
    }
    .cab-fonte a { color: var(--laranxa); text-decoration: none; }
    .cab-fonte a:hover { text-decoration: underline; }

    /* ── SELECTOR DE DÍAS ── */
    .dias {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--bordo);
      overflow-x: auto;
      flex-shrink: 0;
    }
    .dias button {
      flex: 1;
      min-width: 88px;
      padding: 7px 10px;
      background: rgba(255,255,255,.05);
      color: var(--texto-suave);
      border: 1px solid var(--bordo);
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--fonte);
      line-height: 1.3;
    }
    .dias button:hover { background: rgba(255,255,255,.09); color: var(--texto); }
    .dias button.activo {
      background: var(--laranxa);
      color: #fff;
      border-color: var(--laranxa);
      font-weight: 700;
    }
    .dias button small {
      display: block;
      font-size: 0.68rem;
      font-weight: 400;
      opacity: .8;
      font-family: var(--mono);
    }

    /* ── MAPA ── */
    #map { flex: 1; background: var(--fondo); }

    /* ── BARRA DE INFO ── */
    .barra-info {
      background: var(--panel);
      border-top: 1px solid var(--bordo);
      padding: 6px 16px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.72rem;
      color: var(--texto-suave);
      flex-shrink: 0;
    }
    .info-fonte  { color: #6db3ff; }
    .info-capa   { color: var(--texto-suave); }

    /* ── LENDA LEAFLET ── */
    .lenda {
      background: rgba(13,21,32,.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--bordo);
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 0.78rem;
      box-shadow: 0 6px 20px rgba(0,0,0,.4);
    }
    .lenda h4 {
      margin: 0 0 8px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--texto-suave);
      font-weight: 700;
    }
    .lenda .fila { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
    .lenda .cor  { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    /* ── POPUPS LEAFLET ── */
    .leaflet-popup-content-wrapper {
      background: var(--panel) !important;
      color: var(--texto) !important;
      border-radius: 10px !important;
      border: 1px solid var(--bordo) !important;
      box-shadow: 0 6px 20px rgba(0,0,0,.4) !important;
    }
    .leaflet-popup-tip { background: var(--panel) !important; }
    .popup-concello { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .popup-risco    { font-size: 0.85rem; }

    /* ── PE ── */
    .pe {
      background: #050c14;
      border-top: 1px solid var(--bordo);
      padding: 5px 16px;
      font-size: 0.68rem;
      color: rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .pe a { color: rgba(255,255,255,.35); text-decoration: none; }

    @media (max-width: 600px) {
      .cab-titulo { display: none; }
      .cab-fonte { display: none; }
      .lenda { bottom: 80px !important; right: 8px !important; }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- CABECEIRA -->
    <header>
      <div class="cab-marca">
        <img src="./logo-vost-dark.svg" alt="VOST Galicia" class="logo-vost" />
        <div class="cab-divisor"></div>
        <img src="./logo-alvora.svg" alt="ALVORA" class="logo-alvora" />
        <div class="cab-divisor cab-divisor--leve"></div>
        <span class="cab-titulo">IRDI · Risco diario de incendios</span>
        <span class="cab-badge">GALICIA</span>
      </div>
      <div class="cab-dereita">
        <span class="cab-fonte">
          Fonte: <a href="https://mediorural.xunta.gal/es/temas/defensa-monte/irdi" target="_blank" rel="noopener">Medio Rural · Xunta</a>
          &nbsp;·&nbsp;
          <a href="https://vost-alvora.vercel.app" target="_blank" rel="noopener">App VOST incendios ↗</a>
        </span>
      </div>
    </header>

    <!-- SELECTOR DE DÍAS -->
    <div class="dias" id="dias"></div>

    <!-- MAPA -->
    <div id="map"></div>

    <!-- BARRA DE INFO -->
    <div class="barra-info">
      <div id="info-meta" class="info-fonte">Cargando metadatos…</div>
      <div id="info-capa" class="info-capa"></div>
    </div>

    <!-- PÉ -->
    <div class="pe">
      <span>VOST Galicia × ALVORA · Datos: Medio Rural, Xunta de Galicia · Actualización automática diaria ás 10:00h</span>
      <span id="pe-hora"></span>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const NIVEIS = [
      { v: 1, cor: '#0033CC', txt: 'Baixo' },
      { v: 2, cor: '#33CC00', txt: 'Moderado' },
      { v: 3, cor: '#FFCC00', txt: 'Alto' },
      { v: 4, cor: '#FF6600', txt: 'Moi alto' },
      { v: 5, cor: '#CC0000', txt: 'Extremo' },
    ]
    const DIAS = [
      { id: 'dia_1', nome: 'Hoxe' },
      { id: 'dia_2', nome: 'Mañá' },
      { id: 'dia_3', nome: '+2 días' },
      { id: 'dia_4', nome: '+3 días' },
    ]
    const RUTA_DATOS = './data'

    // Hora actual no pé
    document.getElementById('pe-hora').textContent =
      new Date().toLocaleString('gl-ES', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })

    const map = L.map('map', { zoomControl: true }).setView([42.75, -7.9], 8)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19,
    }).addTo(map)

    let capaActual = null
    const cache = {}

    function estiloFeature(feat) {
      const cor = feat.properties.cor || '#95A5A6'
      return { fillColor: cor, fillOpacity: 0.6, color: '#080f18', weight: 0.8 }
    }

    function onCadaFeature(feat, layer) {
      const p = feat.properties
      layer.bindPopup(
        `<div class="popup-concello">${p.concello || 'Concello'}</div>` +
        `<div class="popup-risco">Risco: <strong style="color:${p.cor}">${p.risco || 'Sen dato'}</strong></div>`
      )
      layer.on('mouseover', () => layer.setStyle({ weight: 2, fillOpacity: 0.8 }))
      layer.on('mouseout',  () => layer.setStyle({ weight: 0.8, fillOpacity: 0.6 }))
    }

    async function cargarMeta() {
      try {
        const resp = await fetch(`${RUTA_DATOS}/irdi_meta.json?t=${Date.now()}`)
        if (!resp.ok) return
        const meta = await resp.json()
        const el = document.getElementById('info-meta')
        if (!el) return
        const xerado = meta.xerado ? new Date(meta.xerado) : null
        const fonte = meta.actualizacion_fonte || '—'
        const diffH = xerado ? Math.round((Date.now() - xerado.getTime()) / 3600000) : null
        const ant = diffH === null ? '' : diffH < 1 ? ' · actualizado agora mesmo' : diffH < 24 ? ` · fai ${diffH}h` : ` · fai ${Math.round(diffH/24)}d`
        el.innerHTML =
          `📅 IRDI Medio Rural: <strong>${fonte}</strong>` +
          ` &nbsp;·&nbsp; ⬇️ Última descarga: <strong>${xerado ? xerado.toLocaleString('gl-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'}</strong>${ant}`
      } catch(e) {}
    }

    async function cargarDia(diaId) {
      if (capaActual) { map.removeLayer(capaActual); capaActual = null }
      document.getElementById('info-capa').textContent = 'Cargando…'
      let gj = cache[diaId]
      if (!gj) {
        try {
          const resp = await fetch(`${RUTA_DATOS}/irdi_${diaId}.geojson?t=${Date.now()}`)
          if (!resp.ok) throw new Error()
          gj = await resp.json()
          cache[diaId] = gj
        } catch {
          document.getElementById('info-capa').textContent = '⚠️ Non se puideron cargar os datos deste día.'
          return
        }
      }
      capaActual = L.geoJSON(gj, { style: estiloFeature, onEachFeature: onCadaFeature }).addTo(map)
      const meta = gj.metadata || {}
      const con = meta.con_dato != null ? ` · ${meta.con_dato} con dato` : ''
      document.getElementById('info-capa').textContent =
        `Actualización fonte: ${meta.actualizacion || '—'}${con} · ${(gj.features || []).length} concellos`
    }

    // Botóns de días con data real
    const cont = document.getElementById('dias')
    DIAS.forEach((d, i) => {
      const b = document.createElement('button')
      const dataReal = new Date()
      dataReal.setDate(dataReal.getDate() + i)
      const dataStr = dataReal.toLocaleDateString('gl-ES', { weekday: 'short', day: 'numeric', month: 'short' })
      b.innerHTML = `${d.nome}<small>${dataStr}</small>`
      b.onclick = () => {
        document.querySelectorAll('.dias button').forEach(x => x.classList.remove('activo'))
        b.classList.add('activo')
        cargarDia(d.id)
      }
      if (i === 0) b.classList.add('activo')
      cont.appendChild(b)
    })

    // Lenda
    const lenda = L.control({ position: 'bottomright' })
    lenda.onAdd = function () {
      const div = L.DomUtil.create('div', 'lenda')
      div.innerHTML = '<h4>Nivel de risco</h4>' +
        NIVEIS.map(n => `<div class="fila"><span class="cor" style="background:${n.cor}"></span>${n.txt}</div>`).join('') +
        '<div class="fila"><span class="cor" style="background:#95A5A6"></span>Sen dato</div>'
      return div
    }
    lenda.addTo(map)

    // Carga inicial
    cargarMeta()
    cargarDia('dia_1')
  </script>
</body>
</html>
