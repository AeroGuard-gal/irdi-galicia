name: Actualizar IRDI Galicia

on:
  workflow_dispatch:       # execución manual dende GitHub

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar o repositorio
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }} .
          git config user.name "IRDI bot"
          git config user.email "actions@github.com"

      - name: Instalar dependencias do sistema
        run: sudo apt-get install -y libcairo2-dev pkg-config

      - name: Instalar dependencias Python
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4 geopandas matplotlib cairosvg Pillow

      - name: Verificar capa municipal
        run: |
          if [ -f data/concellos_galicia.geojson ]; then
            echo "✓ Capa municipal presente"
          else
            echo "✗ ERRO: falta data/concellos_galicia.geojson"
            exit 1
          fi

      - name: Actualizar datos do IRDI
        run: python3 scripts/actualizar_irdi.py

      - name: Facer commit dos GeoJSON actualizados
        run: |
          git add data/irdi_dia_*.geojson data/irdi_meta.json
          if git diff --staged --quiet; then
            echo "Sen cambios nos datos."
          else
            git commit -m "IRDI actualizado [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Enviar mapa a Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/enviar_telegram.py
