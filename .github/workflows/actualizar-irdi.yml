name: Actualizar IRDI Galicia

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar o repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Verificar capa municipal
        run: |
          if [ -f data/concellos_galicia.geojson ]; then
            echo "✓ Capa municipal presente"
          else
            echo "✗ ERRO: falta data/concellos_galicia.geojson"
            exit 1
          fi

      - name: Actualizar datos do IRDI
        run: python scripts/actualizar_irdi.py

      - name: Facer commit dos GeoJSON actualizados
        run: |
          git config user.name "IRDI bot"
          git config user.email "actions@github.com"
          git add data/irdi_dia_*.geojson data/irdi_meta.json
          if git diff --staged --quiet; then
            echo "Sen cambios."
          else
            git commit -m "IRDI actualizado [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
